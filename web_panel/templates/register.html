<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - QR Access Control PRO</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="login-page">
        <div class="login-card slide-up" style="max-width: 480px;">
            <div class="login-logo">
                <i data-lucide="user-plus" style="width: 56px; height: 56px; color: var(--accent-primary); filter: drop-shadow(0 4px 12px rgba(255, 94, 0, 0.4));"></i>
            </div>
            <h1 class="login-title">Crear Cuenta</h1>
            <p class="login-subtitle">Regístrate para obtener tu código QR de acceso</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div style="margin-bottom: 20px;">
                {% for category, message in messages %}
                <div class="flash-msg {{ category }}" style="margin-bottom: 8px;">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form class="login-form" method="POST" action="{{ url_for('auth.register') }}">
                <div class="form-group">
                    <label class="form-label" for="nombre">Nombre completo *</label>
                    <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Juan Pérez" required value="{{ request.form.get('nombre', '') }}">
                </div>
                <div class="form-group">
                    <label class="form-label" for="correo">Correo electrónico *</label>
                    <input type="email" id="correo" name="correo" class="form-control" placeholder="juan@empresa.com" required value="{{ request.form.get('correo', '') }}">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Contraseña *</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password2">Confirmar contraseña *</label>
                    <input type="password" id="password2" name="password2" class="form-control" placeholder="Repite la contraseña" required minlength="6">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div class="form-group">
                        <label class="form-label" for="departamento">Departamento</label>
                        <input type="text" id="departamento" name="departamento" class="form-control" placeholder="Ej: TI, RRHH...">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono" class="form-control" placeholder="+54 11 1234...">
                    </div>
                </div>
                <button type="submit" class="login-btn" style="margin-top: 12px;">Crear Cuenta y Obtener QR</button>
            </form>

            <div style="text-align: center; margin-top: 20px; font-size: 0.88rem;">
                <span style="color: var(--text-muted);">¿Ya tienes cuenta?</span>
                <a href="{{ url_for('auth.login') }}" style="margin-left: 4px;">Iniciar Sesión</a>
            </div>

            <div style="text-align: center; margin-top: 16px;">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" style="margin: 0 auto;">
                    <i data-lucide="sun-moon" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Initialize Lucide Icons
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>
</body>
</html>
