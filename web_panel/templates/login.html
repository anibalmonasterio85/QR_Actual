<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QR Access Control PRO</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-page">
        <div class="login-card slide-up">
            <div style="text-align:center; margin-bottom: 20px; font-size: 3rem;"><svg width="48" height="48" fill="none" stroke="url(#gradient)" stroke-width="1.5" viewBox="0 0 24 24"><defs><linearGradient id="gradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient></defs><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" /></svg></div>
            <h1 class="login-title">QR Access PRO</h1>
            <p class="login-subtitle">Sistema de Control de Acceso</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div style="margin-bottom: 20px;">
                {% for category, message in messages %}
                <div class="flash-msg {{ category }}" style="margin-bottom: 8px;">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form class="login-form" method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label class="form-label" for="correo">Correo electrónico</label>
                    <input type="email" id="correo" name="correo" class="form-control" placeholder="admin@qraccess.com" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Iniciar Sesión</button>
            </form>

            <div style="text-align: center; margin-top: 20px; font-size: 0.88rem;">
                <span style="color: var(--text-muted);">¿No tienes cuenta?</span>
                <a href="{{ url_for('auth.register') }}" style="margin-left: 4px;">Regístrate aquí</a>
            </div>

            <div style="text-align: center; margin-top: 16px;">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" style="margin: 0 auto;">🌙</button>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
