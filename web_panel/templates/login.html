<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QR Access Control PRO</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="login-page">
        <div class="login-card slide-up">
            <div class="login-logo">
                <i data-lucide="shield-check" style="width: 56px; height: 56px; color: var(--accent-primary); filter: drop-shadow(0 4px 12px rgba(255, 94, 0, 0.4));"></i>
            </div>
            <h1 class="login-title">QR Access PRO</h1>
            <p class="login-subtitle">Sistema de Control de Acceso</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div style="margin-bottom: 20px;">
                {% for category, message in messages %}
                <div class="flash-msg {{ category }}" style="margin-bottom: 8px;">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form class="login-form" method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label class="form-label" for="correo">Correo electrónico</label>
                    <input type="email" id="correo" name="correo" class="form-control" placeholder="admin@qraccess.com" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Iniciar Sesión</button>
            </form>

            <div style="text-align: center; margin-top: 20px; font-size: 0.88rem;">
                <span style="color: var(--text-muted);">¿No tienes cuenta?</span>
                <a href="{{ url_for('auth.register') }}" style="margin-left: 4px;">Regístrate aquí</a>
            </div>

            <div style="text-align: center; margin-top: 16px;">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" style="margin: 0 auto;">
                    <i data-lucide="sun-moon" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Initialize Lucide Icons
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>
</body>
</html>
