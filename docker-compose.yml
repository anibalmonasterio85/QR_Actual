version: '3.9'

services:
  # QR Access PRO Web Panel
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=mysql
      - DB_USER=qr_access
      - DB_PASSWORD=qr_access_secure_2026
      - DB_NAME=qr_access_db
      - REDIS_URL=redis://redis:6379/0
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    depends_on:
      - mysql
      - redis
    volumes:
      - ./logs:/app/logs
      - ./web_panel/static/qrcodes:/app/web_panel/static/qrcodes
    networks:
      - qr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # MySQL Database
  mysql:
    image: mysql:8.0-alpine
    environment:
      - MYSQL_ROOT_PASSWORD=root_complex_2026
      - MYSQL_DATABASE=qr_access_db
      - MYSQL_USER=qr_access
      - MYSQL_PASSWORD=qr_access_secure_2026
    volumes:
      - mysql_data:/var/lib/mysql
      - ./setup_database.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./schema_extensions.sql:/docker-entrypoint-initdb.d/02-extensions.sql
    ports:
      - "3306:3306"
    networks:
      - qr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - qr_network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - qr_network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  qr_network:
    driver: bridge
